<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vibe Check — Mood to Design Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05050a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;font-family:system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif}
#vc{width:100%;max-width:680px}
.vc-title{font-size:2rem;font-weight:800;letter-spacing:-.03em;color:#f0f0f5;line-height:1.1}
.vc-sub{font-size:.9rem;color:rgba(240,240,245,.45);margin-top:.35rem;margin-bottom:1.75rem}
.vc-label{font-size:.68rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:rgba(240,240,245,.4);display:block;margin-bottom:.55rem}
.vc-input{width:100%;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.11);border-radius:12px;padding:.9rem 1.15rem;font-size:1rem;color:#f0f0f5;outline:none;transition:border-color 200ms}
.vc-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.18)}
.vc-input::placeholder{color:rgba(240,240,245,.28)}
.vc-results{margin-top:1.6rem;display:none}
.vc-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:1.3rem 1.4rem;margin-bottom:1rem;backdrop-filter:blur(8px)}
@keyframes vcIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.vc-card{animation:vcIn .32s cubic-bezier(.4,0,.2,1) both}
.vc-swatches{display:flex;gap:.55rem;flex-wrap:wrap}
.vc-swatch{width:52px;height:52px;border-radius:9px;display:flex;flex-direction:column;justify-content:flex-end;padding:3px 4px;cursor:default;transition:transform 150ms}
.vc-swatch:hover{transform:scale(1.08)}
.vc-hex{font-size:.52rem;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);font-weight:700;font-family:monospace;line-height:1.3}
.vc-swatch-label{font-size:.48rem;color:rgba(255,255,255,.75);text-shadow:0 1px 2px rgba(0,0,0,.8);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.vc-font-pair{font-size:1.05rem;font-weight:700;color:#f0f0f5}
.vc-font-note{font-size:.82rem;color:rgba(240,240,245,.55);margin-top:.3rem}
.vc-style-name{font-size:1.05rem;font-weight:700;color:#f0f0f5;margin-bottom:.5rem}
.vc-bullets{padding-left:1.2rem}
.vc-bullets li{font-size:.84rem;color:rgba(240,240,245,.65);margin:.2rem 0;line-height:1.5}
.vc-pre{background:rgba(0,0,0,.5);border-radius:9px;padding:1rem;font-size:.77rem;color:#a5f3fc;font-family:"Fira Code","Cascadia Code","JetBrains Mono",monospace;overflow-x:auto;white-space:pre;line-height:1.6;margin-bottom:.75rem}
.vc-copy-btn{background:rgba(99,102,241,.18);border:1px solid rgba(99,102,241,.35);color:#a5b4fc;border-radius:9px;padding:.5rem 1.1rem;cursor:pointer;font-size:.82rem;transition:all 150ms;font-family:inherit}
.vc-copy-btn:hover{background:rgba(99,102,241,.3);border-color:rgba(99,102,241,.6)}
.vc-mockup-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.vc-tab{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(240,240,245,.5);border-radius:8px;padding:.35rem .85rem;font-size:.75rem;cursor:pointer;transition:all 150ms;font-family:inherit}
.vc-tab.active{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.vc-mockup-frame{border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.08);position:relative}
.vc-mockup-bar{height:28px;display:flex;align-items:center;gap:6px;padding:0 12px;background:rgba(0,0,0,.3)}
.vc-mockup-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15)}
.vc-mockup-url{flex:1;height:14px;border-radius:4px;background:rgba(255,255,255,.08);margin:0 8px}
.vc-mockup-body{padding:0}
</style>
</head>
<body>
<div id="vc">
  <div class="vc-title">Vibe Check</div>
  <div class="vc-sub">Type a mood or aesthetic — get a full design system instantly</div>
  <label class="vc-label" for="vi">Your Vibe</label>
  <input class="vc-input" id="vi" placeholder="Try: dark hacker, cozy coffee, luxury fintech, vaporwave...">
  <div class="vc-results" id="vr">
    <div class="vc-card" id="vc-palette" style="animation-delay:0ms">
      <div class="vc-label">Color Palette</div>
      <div class="vc-swatches" id="vs"></div>
    </div>
    <div class="vc-card" id="vc-fonts" style="animation-delay:80ms">
      <div class="vc-label">Font Pairing</div>
      <div id="vf"></div>
    </div>
    <div class="vc-card" id="vc-style" style="animation-delay:160ms">
      <div class="vc-label">UI Style</div>
      <div id="vstyle"></div>
    </div>
    <div class="vc-card" style="animation-delay:240ms">
      <div class="vc-label">CSS Variables — Copy &amp; Paste</div>
      <pre class="vc-pre" id="vcss"></pre>
      <button class="vc-copy-btn" id="vcopy">Copy CSS</button>
    </div>
    <div class="vc-card" id="vc-mockup" style="animation-delay:320ms">
      <div class="vc-label">Mockup Preview</div>
      <div class="vc-mockup-tabs">
        <button class="vc-tab active" id="tab-landing" onclick="switchTab('landing')">Landing Page</button>
        <button class="vc-tab" id="tab-dashboard" onclick="switchTab('dashboard')">Dashboard</button>
      </div>
      <div class="vc-mockup-frame">
        <div class="vc-mockup-bar">
          <div class="vc-mockup-dot"></div>
          <div class="vc-mockup-dot"></div>
          <div class="vc-mockup-dot"></div>
          <div class="vc-mockup-url"></div>
        </div>
        <div class="vc-mockup-body" id="vmockup"></div>
      </div>
    </div>
  </div>
</div>

function match(q) {
  const s = q.toLowerCase().trim();
  if (!s) return null;
  let best = null, top = 0;
  for (const p of PROFILES) {
    let sc = 0;
    for (const k of p.k) {
      if (s === k) sc += 3;
      else if (s.includes(k)) sc += 2;
      else if (k.includes(s) && s.length > 2) sc += 1;
    }
    if (sc > top) { top = sc; best = p; }
  }
  return best || PROFILES[4];
}

  currentTab = tab;
  document.getElementById('tab-landing').className = 'vc-tab' + (tab === 'landing' ? ' active' : '');
  document.getElementById('tab-dashboard').className = 'vc-tab' + (tab === 'dashboard' ? ' active' : '');

}

function isColorDark(hex) {
  var h = hex.replace('#','');
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  var r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);
  return (r*299 + g*587 + b*114) / 1000 < 128;
}

let timer;
document.getElementById("vi").addEventListener("input", e => {
  clearTimeout(timer);
  timer = setTimeout(() => {
    const v = e.target.value.trim();
    const res = document.getElementById("vr");
    if (v.length < 2) { res.style.display = "none"; return; }
    const p = match(v);
    res.style.display = "block";

    // Reset animations
    document.querySelectorAll(".vc-card").forEach(c => {
      c.style.animation = "none";
      void c.offsetHeight;
      c.style.animation = "";
    });

    // Swatches
    document.getElementById("vs").innerHTML = p.p.map(c =>
      `<div class="vc-swatch" style="background:${c.h}" title="${c.l}: ${c.h}">
        <span class="vc-hex">${c.h}</span>
        <span class="vc-swatch-label">${c.l}</span>
      </div>`
    ).join("");

    // Fonts
    document.getElementById("vf").innerHTML =
      `<div class="vc-font-pair">${p.f.h} &nbsp;/&nbsp; ${p.f.b}</div>
       <div class="vc-font-note">${p.f.n}</div>`;

    // Style
    document.getElementById("vstyle").innerHTML =
      `<div class="vc-style-name">${p.s.n}</div>
       <ul class="vc-bullets">${p.s.b.map(b => `<li>${b}</li>`).join("")}</ul>`;

    // CSS vars
    document.getElementById("vcss").textContent = p.c;

    // Mockup
    currentProfile = p;
    renderMockup(p);

    // Copy button
    document.getElementById("vcopy").onclick = () => {
      navigator.clipboard.writeText(p.c).then(() => {
        const btn = document.getElementById("vcopy");
        btn.textContent = "Copied!";
        btn.style.background = "rgba(99,102,241,.45)";
        setTimeout(() => {
          btn.textContent = "Copy CSS";
          btn.style.background = "";
        }, 2000);
      });
    };
  }, 300);
});
